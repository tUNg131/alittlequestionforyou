<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Little Question for You</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Quicksand', sans-serif;
      min-height: 100vh;
      overflow: hidden;
      background: linear-gradient(160deg, #fdf6f0 0%, #fef0f0 30%, #fde8e8 60%, #faf0f4 100%);
    }

    /* ========== FLOATING PETALS ========== */
    .petal {
      position: fixed;
      font-size: 1.4rem;
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(105vh) translateX(0);
        opacity: 0;
      }
      10% { opacity: 0.35; }
      90% { opacity: 0.35; }
      100% {
        transform: translateY(-60px) translateX(60px);
        opacity: 0;
      }
    }

    /* ========== MAIN CONTENT ========== */
    #main-content {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
      z-index: 1;
      padding: 1.5rem;
    }

    .card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(14px);
      border-radius: 24px;
      padding: 2.5rem 2.8rem 2.2rem;
      max-width: 440px;
      width: 100%;
      text-align: center;
      box-shadow:
        0 8px 30px rgba(180, 120, 120, 0.1),
        0 1px 6px rgba(0, 0, 0, 0.04);
      border: 1.5px solid rgba(230, 200, 200, 0.5);
      animation: cardAppear 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      opacity: 0;
      transform: scale(0.8) translateY(30px);
    }

    @keyframes cardAppear {
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .card-deco {
      font-size: 2.6rem;
      margin-bottom: 0.6rem;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.4rem;
    }

    .card-deco span {
      display: inline-block;
      animation: tulipSway 3s ease-in-out infinite;
    }

    .card-deco span:nth-child(2) { animation-delay: 0.3s; }
    .card-deco span:nth-child(3) { animation-delay: 0.6s; }

    @keyframes tulipSway {
      0%, 100% { transform: rotate(-4deg); }
      50% { transform: rotate(4deg); }
    }

    .greeting {
      font-size: 1.05rem;
      color: #b07070;
      font-weight: 600;
      margin-bottom: 0.8rem;
    }

    .question {
      font-size: 1.4rem;
      color: #8b5e5e;
      font-weight: 700;
      line-height: 1.55;
      margin-bottom: 2rem;
    }

    @media (max-width: 480px) {
      .card {
        padding: 2rem 1.6rem 1.8rem;
        border-radius: 20px;
      }
      .card-deco { font-size: 2.2rem; }
      .greeting { font-size: 0.95rem; }
      .question { font-size: 1.2rem; margin-bottom: 1.6rem; }
      .btn { padding: 0.75rem 2rem; font-size: 1rem; }
    }

    .buttons {
      display: flex;
      gap: 1.2rem;
      justify-content: center;
      align-items: center;
    }

    .btn {
      padding: 0.85rem 2.4rem;
      border-radius: 50px;
      border: none;
      font-family: 'Quicksand', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s ease;
      letter-spacing: 0.3px;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-yes {
      background: linear-gradient(135deg, #e8a0a0, #d48a8a);
      color: #fff;
      box-shadow: 0 3px 14px rgba(200, 130, 130, 0.3);
    }

    .btn-yes:hover {
      background: linear-gradient(135deg, #d48a8a, #c07878);
      box-shadow: 0 5px 20px rgba(200, 130, 130, 0.45);
      transform: scale(1.06);
    }

    .btn-no {
      background: #f5eded;
      color: #a07070;
      box-shadow: 0 2px 8px rgba(160, 112, 112, 0.1);
      border: 1.5px solid #e8d8d8;
    }

    .btn-no.runaway {
      position: fixed;
      z-index: 10;
      transition:
        left 0.22s cubic-bezier(0.22, 1, 0.36, 1),
        top 0.22s cubic-bezier(0.22, 1, 0.36, 1),
        transform 0.22s ease;
    }

    .btn-placeholder {
      visibility: hidden;
      pointer-events: none;
    }

    /* ========== CONFIRMATION ========== */
    #celebration {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 50;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: linear-gradient(160deg, #fff6f7 0%, #fceff1 45%, #f9e7eb 100%);
      padding: 1.5rem;
      opacity: 0;
      transition: opacity 0.45s ease;
    }

    #celebration.show {
      display: flex;
      opacity: 1;
    }

    .celeb-content {
      position: relative;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(226, 191, 198, 0.7);
      border-radius: 26px;
      padding: 2.2rem 2.4rem;
      min-width: min(420px, 92vw);
      box-shadow:
        0 10px 32px rgba(186, 139, 149, 0.14),
        0 0 0 10px rgba(255, 255, 255, 0.18);
      animation: celebPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards, softGlow 2.4s ease-in-out infinite;
      opacity: 0;
      transform: scale(0.5);
    }

    @keyframes celebPop {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes softGlow {
      0%, 100% {
        box-shadow:
          0 10px 32px rgba(186, 139, 149, 0.14),
          0 0 0 10px rgba(255, 255, 255, 0.18);
      }
      50% {
        box-shadow:
          0 14px 38px rgba(186, 139, 149, 0.18),
          0 0 0 14px rgba(255, 255, 255, 0.24);
      }
    }

    .celeb-icon {
      font-size: 3rem;
      margin-bottom: 0.8rem;
    }

    .celeb-title {
      font-size: 2.3rem;
      font-weight: 700;
      color: #8b5e5e;
      margin-bottom: 0.45rem;
    }

    .celeb-subtitle {
      font-size: 1.12rem;
      color: #b07070;
      font-weight: 600;
      margin-bottom: 0.55rem;
    }

    .celeb-note {
      font-size: 0.92rem;
      color: #b78a8a;
      letter-spacing: 0.2px;
      margin-bottom: 0.9rem;
    }

    .celeb-flowers {
      font-size: 1.4rem;
      letter-spacing: 0.45rem;
      opacity: 0.9;
    }

    .celeb-sparkles {
      position: absolute;
      inset: -18px;
      pointer-events: none;
      z-index: -1;
    }

    .celeb-sparkles span {
      position: absolute;
      color: rgba(232, 180, 188, 0.9);
      font-size: 1.1rem;
      animation: twinkleSpark 2s ease-in-out infinite;
    }

    .celeb-sparkles span:nth-child(1) { top: 12px; left: 16px; }
    .celeb-sparkles span:nth-child(2) { top: 24px; right: 28px; animation-delay: 0.4s; }
    .celeb-sparkles span:nth-child(3) { bottom: 18px; left: 36px; animation-delay: 0.8s; }
    .celeb-sparkles span:nth-child(4) { bottom: 14px; right: 18px; animation-delay: 1.2s; }

    @keyframes twinkleSpark {
      0%, 100% { opacity: 0.25; transform: scale(0.85); }
      50% { opacity: 0.85; transform: scale(1.1); }
    }

    .floating-tulip {
      position: fixed;
      bottom: -32px;
      font-size: 1.3rem;
      opacity: 0;
      pointer-events: none;
      z-index: 52;
      animation: tulipBurstUp 1.6s ease-out forwards;
    }

    @keyframes tulipBurstUp {
      0% {
        transform: translateY(0) translateX(0) scale(0.8);
        opacity: 0;
      }
      20% {
        opacity: 0.9;
      }
      100% {
        transform: translateY(-180px) translateX(var(--drift-x, 0px)) scale(1.05);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <!-- Floating petals background -->
  <div id="petals-container"></div>

  <!-- Main question content -->
  <div id="main-content">
    <div class="card">
      <div class="card-deco">
        <span>🌷</span>
        <span>🌷</span>
        <span>🌷</span>
      </div>
      <p class="greeting">I have a question...</p>
      <p class="question">Would you like to get coffee with me this week? ☕</p>
      <p class="serious-note">This is a very serious website.</p>
      <div class="buttons">
        <button class="btn btn-yes" id="btn-yes">Yes!</button>
        <button class="btn btn-no" id="btn-no">No</button>
      </div>
    </div>
  </div>

  <!-- Celebration screen -->
  <div id="celebration">
    <div class="celeb-content">
      <div class="celeb-sparkles">
        <span>✦</span>
        <span>✦</span>
        <span>✦</span>
        <span>✦</span>
      </div>
      <h1 class="celeb-title">Yay 🌷</h1>
      <p class="celeb-subtitle">Decision recorded</p>
    </div>
  </div>

  <script>
    (function () {
      const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent)
        || (navigator.maxTouchPoints > 1 && /Macintosh/i.test(navigator.userAgent));

      const main = document.getElementById('main-content');
      const petals = document.getElementById('petals-container');

      // --- Floating petals ---
      const petalEmojis = ['🌸', '🌷', '🌸', '🌷'];
      function spawnPetal() {
        const el = document.createElement('div');
        el.classList.add('petal');
        el.textContent = petalEmojis[Math.floor(Math.random() * petalEmojis.length)];
        el.style.left = Math.random() * 100 + 'vw';
        el.style.fontSize = (1 + Math.random() * 1.2) + 'rem';
        el.style.animationDuration = (8 + Math.random() * 8) + 's';
        el.style.animationDelay = Math.random() * 2 + 's';
        petals.appendChild(el);
        el.addEventListener('animationend', () => el.remove());
      }
      for (let i = 0; i < 8; i++) setTimeout(spawnPetal, i * 500);
      setInterval(spawnPetal, 2500);

      // --- Runaway No button ---
      const btnNo = document.getElementById('btn-no');
      let runawayCount = 0;
      let noPlaceholder = null;

      function moveNoButton() {
        runawayCount++;

        const taunts = [
          'Nope!', 'Try again!', 'Not here!', 'Catch me!',
          'Hehe!', 'Too slow!', 'Nice try!', 'Over here!'
        ];
        if (runawayCount > 2) {
          btnNo.textContent = taunts[Math.floor(Math.random() * taunts.length)];
        }

        if (!btnNo.classList.contains('runaway')) {
          const startRect = btnNo.getBoundingClientRect();
          noPlaceholder = document.createElement('span');
          noPlaceholder.className = 'btn btn-no btn-placeholder';
          noPlaceholder.setAttribute('aria-hidden', 'true');
          noPlaceholder.style.width = `${startRect.width}px`;
          noPlaceholder.style.height = `${startRect.height}px`;
          btnNo.insertAdjacentElement('afterend', noPlaceholder);
          document.body.appendChild(btnNo);
          btnNo.classList.add('runaway');
          btnNo.style.left = `${startRect.left}px`;
          btnNo.style.top = `${startRect.top}px`;
        }

        const rect = btnNo.getBoundingClientRect();
        const margin = 20;
        const maxX = window.innerWidth - rect.width - margin;
        const maxY = window.innerHeight - rect.height - margin;
        const newX = margin + Math.random() * Math.max(0, maxX - margin);
        const newY = margin + Math.random() * Math.max(0, maxY - margin);

        requestAnimationFrame(() => {
          btnNo.style.left = newX + 'px';
          btnNo.style.top = newY + 'px';
        });
      }

      if (isMobile) {
        btnNo.addEventListener('touchstart', function (e) {
          e.preventDefault();
          moveNoButton();
        }, { passive: false });
      } else {
        btnNo.addEventListener('mouseover', moveNoButton);
      }

      // --- Yes button celebration ---
      const btnYes = document.getElementById('btn-yes');
      const celebration = document.getElementById('celebration');

      btnYes.addEventListener('click', function () {
        main.style.display = 'none';
        petals.style.display = 'none';
        if (btnNo.classList.contains('runaway')) btnNo.style.display = 'none';
        celebration.classList.add('show');
        launchTulipBurst();
      });

      // --- Gentle tulip burst ---
      function launchTulipBurst() {
        const tulips = ['🌷', '🌷', '🌸', '🌷'];

        for (let i = 0; i < 18; i++) {
          setTimeout(() => {
            const el = document.createElement('div');
            el.className = 'floating-tulip';
            el.textContent = tulips[Math.floor(Math.random() * tulips.length)];
            el.style.left = (10 + Math.random() * 80) + 'vw';
            el.style.fontSize = (1 + Math.random() * 0.8) + 'rem';
            el.style.setProperty('--drift-x', ((Math.random() - 0.5) * 90) + 'px');
            document.body.appendChild(el);
            el.addEventListener('animationend', () => el.remove());
          }, i * 80);
        }
      }
    })();
  </script>
</body>
</html>
